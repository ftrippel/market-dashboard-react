name: Fetch Market Data

on:
  schedule:
    # Every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: '3.11'
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -r scripts/requirements.txt

      - name: Run data fetcher
        run: uv run python scripts/fetch_data.py
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
