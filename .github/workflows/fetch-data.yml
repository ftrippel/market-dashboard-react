name: Fetch Market Data

on:
  schedule:
    # 22:00 UTC Mon–Fri ≈ 06:00 HKT next calendar day
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install yfinance requests pandas beautifulsoup4 lxml

      - name: Run data fetcher
        working-directory: ${{ github.workspace }}
        run: python scripts/fetch_data.py
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: refresh market data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push
